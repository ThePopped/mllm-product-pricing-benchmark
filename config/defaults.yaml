paths:
  urls_csv: data/raw/ufurnish_sofa_urls.csv
  scraping_artifacts_dir: artifacts/scraping
  cloudflare_state_file: artifacts/scraping/shared/cf_state.json
  extraction_artifacts_dir: artifacts/feature_extraction
  extraction_output_jsonl: data/processed/MLLM_extracted_features.jsonl
  split_src_jsonl: data/processed/MLLM_extracted_features.jsonl
  train_jsonl: data/processed/train.jsonl
  holdout_jsonl: data/processed/holdout.jsonl
  inference_input_jsonl: data/processed/holdout.jsonl
  inference_output_jsonl: data/processed/predictions.jsonl
  model_out: models/best_model.pkl
  meta_out: models/category_meta.json
  lineage_out: models/lineage.json
  eval_plots_dir: models

scraping:
  limit: 1000

extraction:
  model_id: Qwen/Qwen3-VL-4B-Instruct
  glob_pattern: "*.png"
  max_new_tokens: 300
  temperature: 0.2
  retry_on_invalid_json: 1
  min_pixels: 65536
  max_pixels: 1048576
  seed: 42
  experiment: sofa_price_regression
  run_name: feature_extraction

split:
  holdout_size: 0.15
  seed: 42

train:
  n_iter: 60
  price_cap: 6000.0
  experiment: sofa_price_regression

evaluate:
  price_cap: 6000.0
  experiment: sofa_price_regression

inference:
  experiment: sofa_price_regression
  run_name: batch_inference
