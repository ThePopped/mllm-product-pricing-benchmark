<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>{{ app_title }}</h1>
      <p>{{ ui_subtitle }}</p>
    </header>

    <form id="predict-form" class="grid">
      <section class="card">
        <h2>Numeric Features</h2>
        <div id="numeric-fields" class="fields-grid"></div>
      </section>

      <section class="card">
        <h2>Categorical Features</h2>
        <div id="categorical-fields" class="fields-grid"></div>

        <label class="muted inline-checkbox">
          <input id="show-all" type="checkbox">
          <span id="show-all-label">Show all category values</span>
        </label>
      </section>

      <section class="actions card">
        <button id="predict-btn" type="submit">Predict price</button>
        <div id="status" class="muted">Loading schema...</div>
      </section>
    </form>

    <section id="result" class="card result-card" style="display:none;"></section>
  </div>

  <script>
    const numericFieldsEl = document.getElementById("numeric-fields");
    const categoricalFieldsEl = document.getElementById("categorical-fields");
    const showAllEl = document.getElementById("show-all");
    const showAllLabelEl = document.getElementById("show-all-label");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const predictBtnEl = document.getElementById("predict-btn");

    let schema = null;
    let topK = 10;
    const numericState = {};
    const categoricalState = {};

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? "error" : "muted";
    }

    function fillSelect(selectEl, values, selectedRaw) {
      const selected = selectedRaw !== undefined && selectedRaw !== null ? String(selectedRaw) : "";
      selectEl.innerHTML = "";
      values.forEach((v) => {
        const opt = document.createElement("option");
        opt.value = String(v);
        opt.textContent = String(v);
        if (String(v) === selected) {
          opt.selected = true;
        }
        selectEl.appendChild(opt);
      });
      if (values.length > 0 && !selectEl.value) {
        selectEl.value = String(values[0]);
      }
    }

    function categoryOptions(field) {
      if (showAllEl.checked) {
        return (schema.categorical_fields_all && schema.categorical_fields_all[field]) || [];
      }
      return (schema.categorical_fields_top && schema.categorical_fields_top[field]) || [];
    }

    function numericDefault(field) {
      const def = schema.numeric_fields[field]?.default;
      return (typeof def === "number" && Number.isFinite(def)) ? def : 1;
    }

    function categoricalDefault(field) {
      const fromSchema = schema.categorical_defaults ? schema.categorical_defaults[field] : null;
      if (fromSchema !== undefined && fromSchema !== null) return fromSchema;
      const opts = categoryOptions(field);
      return opts.length ? opts[0] : "";
    }

    function coerceCategoricalValueForRequest(field, rawValue) {
      const allowed = (schema.categorical_fields_all && schema.categorical_fields_all[field]) || [];
      if (!allowed.length) return rawValue;

      const hasBool = allowed.some((v) => typeof v === "boolean");
      if (hasBool) {
        const lowered = String(rawValue).toLowerCase();
        if (lowered === "true" || lowered === "1" || lowered === "yes") return true;
        if (lowered === "false" || lowered === "0" || lowered === "no") return false;
      }

      const hasNumber = allowed.some((v) => typeof v === "number");
      if (hasNumber) {
        const n = Number(rawValue);
        if (Number.isFinite(n) && allowed.includes(n)) return n;
      }

      return rawValue;
    }

    function renderNumericFields() {
      numericFieldsEl.innerHTML = "";
      Object.keys(schema.numeric_fields || {}).sort().forEach((field) => {
        const wrap = document.createElement("label");
        wrap.className = "field-row";
        wrap.textContent = field;

        const input = document.createElement("input");
        input.type = "number";
        input.min = "0.0000001";
        input.step = "any";
        const value = numericState[field] ?? numericDefault(field);
        numericState[field] = Number(value);
        input.value = String(numericState[field]);
        input.dataset.field = field;
        input.required = true;

        input.addEventListener("input", () => {
          const n = Number(input.value);
          if (Number.isFinite(n)) {
            numericState[field] = n;
          }
        });

        wrap.appendChild(input);
        numericFieldsEl.appendChild(wrap);
      });
    }

    function renderCategoricalFields() {
      categoricalFieldsEl.innerHTML = "";
      Object.keys(schema.categorical_fields_top || {}).sort().forEach((field) => {
        const wrap = document.createElement("label");
        wrap.className = "field-row";
        wrap.textContent = field;

        const select = document.createElement("select");
        select.dataset.field = field;
        const options = categoryOptions(field);
        const remembered = categoricalState[field] ?? categoricalDefault(field);
        fillSelect(select, options, remembered);
        categoricalState[field] = select.value;

        select.addEventListener("change", () => {
          categoricalState[field] = select.value;
        });

        wrap.appendChild(select);
        categoricalFieldsEl.appendChild(wrap);
      });
    }

    function refreshCategoricalOptionsPreserve() {
      const selects = categoricalFieldsEl.querySelectorAll("select[data-field]");
      selects.forEach((select) => {
        const field = select.dataset.field;
        const options = categoryOptions(field);
        const remembered = categoricalState[field] ?? categoricalDefault(field);
        fillSelect(select, options, remembered);
        categoricalState[field] = select.value;
      });
    }

    async function init() {
      try {
        predictBtnEl.disabled = true;
        setStatus("Loading schema...");
        const res = await fetch("/v1/schema");
        if (!res.ok) {
          throw new Error("Schema request failed: " + res.status);
        }
        schema = await res.json();
        topK = Number(schema.top_k_categories || 10);
        showAllLabelEl.textContent = `Show all category values (default shows top ${topK} values)`;

        renderNumericFields();
        renderCategoricalFields();
        showAllEl.addEventListener("change", refreshCategoricalOptionsPreserve);
        predictBtnEl.disabled = false;
        setStatus("Ready.");
      } catch (err) {
        predictBtnEl.disabled = true;
        setStatus("Failed to initialize UI: " + err.message, true);
      }
    }

    document.getElementById("predict-form").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      resultEl.style.display = "none";

      const numericValues = {};
      Object.keys(schema.numeric_fields || {}).forEach((field) => {
        const v = Number(numericState[field]);
        if (Number.isFinite(v)) {
          numericValues[field] = v;
        }
      });

      const categoricalValues = {};
      Object.keys(schema.categorical_fields_all || {}).forEach((field) => {
        categoricalValues[field] = coerceCategoricalValueForRequest(field, categoricalState[field]);
      });

      const payload = {
        numeric_values: numericValues,
        categorical_values: categoricalValues
      };

      try {
        setStatus("Requesting prediction...");
        const res = await fetch("/v1/predict_full", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const body = await res.json();
        if (!res.ok) {
          throw new Error(body.detail || ("Predict request failed: " + res.status));
        }

        resultEl.innerHTML =
          "<h3>Prediction</h3>" +
          "<p><strong>Predicted price:</strong> " + body.predicted_price.toFixed(2) + "</p>" +
          "<p class='muted'>model_version: " + (body.model_version || "n/a") + "</p>" +
          "<p class='muted'>train_run_id: " + (body.train_run_id || "n/a") + "</p>" +
          "<p class='muted'>data_split_id: " + (body.data_split_id || "n/a") + "</p>";
        resultEl.style.display = "block";
        setStatus("Prediction complete.");
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    init();
  </script>
</body>
</html>
