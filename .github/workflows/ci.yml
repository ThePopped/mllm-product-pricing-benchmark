name: CI

on:
  push:
    paths:
      - "src/**.py"
      - "tests/**.py"
      - "config/**.yaml"
      - "data/**"
      - "models/**"
      - "artifacts/**"
      - "mlruns/**"
      - "requirements*.txt"
      - ".env"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux.txt
          pip install -e .
          pip install pytest matplotlib

      - name: Run tests
        run: pytest -q
